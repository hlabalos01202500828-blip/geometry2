<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 GEOMETRY MASTERY — Complete Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08100a;
  --surface: #0d180f;
  --card: #122015;
  --card2: #172a1a;
  --border: rgba(180,150,60,0.15);
  --primary: #d4af37;
  --primary-dim: rgba(212,175,55,0.12);
  --secondary: #4ade80;
  --secondary-dim: rgba(74,222,128,0.12);
  --success: #4ade80;
  --success-dim: rgba(74,222,128,0.15);
  --warning: #fb923c;
  --error: #f87171;
  --accent: #c084fc;
  --accent-dim: rgba(192,132,252,0.12);
  --text: #f0e8d8;
  --text-muted: #a89880;
  --text-dim: #5a6650;
  --r: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(circle at 15% 25%, rgba(212,175,55,0.04) 0%, transparent 50%),
  radial-gradient(circle at 85% 75%, rgba(74,222,128,0.03) 0%, transparent 50%),
  linear-gradient(rgba(212,175,55,0.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(212,175,55,0.025) 1px,transparent 1px);
background-size:100% 100%,100% 100%,56px 56px,56px 56px;pointer-events:none;z-index:0}

/* HEADER */
#app-header{position:sticky;top:0;z-index:100;background:rgba(8,16,10,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:10px 20px;flex-wrap:wrap}
.app-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:900;color:var(--primary);letter-spacing:0.06em;white-space:nowrap}
.app-title span{color:var(--secondary)}
.header-sub{font-size:0.68rem;color:var(--text-dim);letter-spacing:0.18em;font-family:'Fira Code',monospace}
.xp-container{display:flex;align-items:center;gap:10px;flex:1;min-width:200px;max-width:380px}
.level-badge{font-family:'Cinzel',serif;font-size:0.72rem;font-weight:700;color:var(--bg);background:var(--primary);padding:3px 10px;border-radius:20px;white-space:nowrap}
.xp-bar-track{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden;min-width:80px}
.xp-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),#f59e0b);border-radius:4px;transition:width 0.6s ease}
.xp-text{font-size:0.7rem;color:var(--text-muted);font-family:'Fira Code',monospace;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.streak-badge{font-size:0.82rem;background:var(--warning);background:rgba(251,146,60,0.15);border:1px solid var(--warning);color:var(--warning);padding:4px 12px;border-radius:20px;font-weight:700}
.timer-btn{background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);padding:5px 14px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;transition:all 0.2s}
.timer-btn:hover{background:var(--primary);color:var(--bg)}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 56px);position:relative;z-index:1}
.sidebar{width:245px;min-width:245px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.sidebar-header{font-family:'Cinzel',serif;font-size:0.62rem;font-weight:700;color:var(--text-dim);letter-spacing:0.22em;padding:0 16px 12px}
.topic-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;position:relative}
.topic-item:hover{background:var(--card);border-left-color:var(--primary)}
.topic-item.active{background:var(--primary-dim);border-left-color:var(--primary)}
.topic-icon{font-size:1.05rem;width:24px;text-align:center;flex-shrink:0}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:0.8rem;font-weight:700;color:var(--text);line-height:1.2}
.topic-item.active .topic-name{color:var(--primary)}
.topic-progress-mini{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.topic-progress-fill{height:100%;background:var(--success);border-radius:2px;transition:width 0.5s}
.topic-num{font-family:'Fira Code',monospace;font-size:0.63rem;color:var(--text-dim);flex-shrink:0}

.main-content{flex:1;padding:24px;overflow-y:auto}

/* TABS */
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);padding:5px;border-radius:12px;margin-bottom:24px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:80px;padding:8px 12px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;transition:all 0.2s}
.tab-btn:hover{color:var(--text);background:var(--card)}
.tab-btn.active{background:var(--primary);color:var(--bg)}

/* TOPIC HEADER */
.topic-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;padding:20px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);position:relative;overflow:hidden}
.topic-header::before{content:'';position:absolute;top:-20px;right:-20px;width:140px;height:140px;border-radius:50%;background:var(--primary-dim);filter:blur(40px)}
.topic-header-icon{font-size:2.5rem;flex-shrink:0}
.topic-header-title{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:900;color:var(--primary);line-height:1.2}
.topic-header-tagline{font-size:0.83rem;color:var(--text-muted);margin-top:4px;font-style:italic}
.topic-header-progress{display:flex;align-items:center;gap:10px;margin-top:10px}
.topic-progress-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;max-width:200px}
.topic-progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:3px;transition:width 0.5s}
.topic-progress-text{font-family:'Fira Code',monospace;font-size:0.7rem;color:var(--text-dim)}

/* CONCEPT CARDS */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:20px}
.concept-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:border-color 0.2s}
.concept-card:hover{border-color:rgba(212,175,55,0.3)}
.concept-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),transparent)}
.concept-card-icon{font-size:1.5rem;margin-bottom:8px}
.concept-card-title{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:var(--primary);margin-bottom:8px}
.concept-card-body{font-size:0.85rem;color:var(--text-muted);line-height:1.7}
.concept-card-body strong{color:var(--text)}
.formula-box{background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:12px 14px;margin:10px 0;font-family:'Fira Code',monospace;font-size:0.85rem;color:var(--primary);line-height:1.8}
.formula-box .label{font-size:0.7rem;color:var(--text-dim);font-family:'Nunito',sans-serif;margin-bottom:4px;font-weight:700;letter-spacing:0.1em}
.tip-box{background:rgba(74,222,128,0.07);border-left:3px solid var(--secondary);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.83rem;color:var(--text-muted)}
.tip-box strong{color:var(--secondary)}
.warn-box{background:rgba(251,146,60,0.07);border-left:3px solid var(--warning);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.83rem;color:var(--text-muted)}
.warn-box strong{color:var(--warning)}
.eng-box{background:rgba(192,132,252,0.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.83rem;color:var(--text-muted)}
.eng-box strong{color:var(--accent)}
.note-box{background:rgba(212,175,55,0.07);border-left:3px solid var(--primary);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.83rem;color:var(--text-muted)}
.note-box strong{color:var(--primary)}
.def-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:0.83rem}
.def-box .term{font-family:'Cinzel',serif;color:var(--primary);font-weight:700;font-size:0.85rem}
.def-box .definition{color:var(--text-muted);margin-top:2px}
.section-label{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;color:var(--text-dim);letter-spacing:0.2em;margin:18px 0 8px;text-transform:uppercase}

/* EXAMPLES */
.example-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.example-header{padding:14px 18px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.example-title{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:var(--primary)}
.example-difficulty{font-size:0.7rem;font-family:'Fira Code',monospace;padding:2px 8px;border-radius:10px;font-weight:600}
.diff-basic{background:rgba(74,222,128,0.15);color:var(--secondary);border:1px solid rgba(74,222,128,0.3)}
.diff-inter{background:rgba(212,175,55,0.15);color:var(--primary);border:1px solid rgba(212,175,55,0.3)}
.diff-adv{background:rgba(248,113,113,0.15);color:var(--error);border:1px solid rgba(248,113,113,0.3)}
.example-problem{padding:14px 18px;font-size:0.88rem;background:rgba(212,175,55,0.04);border-bottom:1px solid var(--border);color:var(--text)}
.example-problem em{color:var(--primary);font-style:normal;font-family:'Fira Code',monospace}
.steps-container{padding:14px 18px}
.step{display:flex;gap:12px;margin-bottom:12px;opacity:0;transform:translateY(8px);transition:all 0.3s ease}
.step.visible{opacity:1;transform:none}
.step-num{width:26px;height:26px;min-width:26px;background:var(--primary);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.75rem;font-family:'Cinzel',serif;flex-shrink:0;margin-top:1px}
.step-content{font-size:0.85rem;color:var(--text-muted);line-height:1.7;flex:1}
.step-content strong{color:var(--text)}
.step-content .math{font-family:'Fira Code',monospace;color:var(--primary);background:rgba(212,175,55,0.08);padding:1px 6px;border-radius:4px;font-size:0.82rem}
.step-content .ans{font-family:'Fira Code',monospace;color:var(--secondary);background:rgba(74,222,128,0.1);padding:2px 8px;border-radius:4px;font-weight:600}
.step-actions{display:flex;gap:8px;margin-top:10px}
.step-btn{padding:7px 18px;border:1px solid var(--border);background:var(--card2);color:var(--text-muted);border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;transition:all 0.2s}
.step-btn:hover{border-color:var(--primary);color:var(--primary)}
.step-btn.primary{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}
.answer-box{margin-top:10px;padding:12px;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.25);border-radius:8px;font-family:'Fira Code',monospace;font-size:0.88rem;color:var(--secondary)}
.answer-box .label{font-size:0.7rem;color:var(--text-dim);font-family:'Nunito',sans-serif;margin-bottom:4px;font-weight:700;letter-spacing:0.1em}

/* PRACTICE */
.quiz-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.quiz-score-display{font-family:'Fira Code',monospace;font-size:0.85rem;color:var(--text-muted)}
.quiz-score-display span{color:var(--primary);font-weight:700}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;transition:border-color 0.3s}
.question-card.correct{border-color:rgba(74,222,128,0.5)}
.question-card.wrong{border-color:rgba(248,113,113,0.4)}
.question-num{font-family:'Fira Code',monospace;font-size:0.7rem;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.question-text{font-size:0.9rem;color:var(--text);margin-bottom:14px;line-height:1.6}
.question-text .math{font-family:'Fira Code',monospace;color:var(--primary);background:rgba(212,175,55,0.08);padding:1px 6px;border-radius:4px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.option-btn{padding:9px 14px;border:1px solid var(--border);background:var(--card2);color:var(--text-muted);border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.83rem;text-align:left;transition:all 0.2s;line-height:1.4}
.option-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);background:var(--primary-dim)}
.option-btn.selected-correct{background:rgba(74,222,128,0.12);border-color:var(--success);color:var(--success)}
.option-btn.selected-wrong{background:rgba(248,113,113,0.1);border-color:var(--error);color:var(--error)}
.option-btn.reveal-correct{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4);color:var(--success)}
.option-btn:disabled{cursor:default;opacity:0.7}
.feedback-box{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:0.83rem;line-height:1.6;display:none}
.feedback-box.show{display:block}
.feedback-box.correct{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);color:var(--text-muted)}
.feedback-box.correct strong{color:var(--success)}
.feedback-box.wrong{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);color:var(--text-muted)}
.feedback-box.wrong strong{color:var(--error)}
.quiz-controls{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.quiz-btn{padding:9px 22px;border:none;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.88rem;transition:all 0.2s}
.quiz-btn-primary{background:var(--primary);color:var(--bg)}
.quiz-btn-primary:hover{opacity:0.88}
.quiz-btn-secondary{background:var(--card2);border:1px solid var(--border);color:var(--text-muted)}
.quiz-btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.quiz-result{padding:20px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);text-align:center;margin-top:16px;display:none}
.quiz-result.show{display:block}
.quiz-result-score{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;color:var(--primary)}
.quiz-result-label{font-size:0.85rem;color:var(--text-muted);margin-top:4px}
.quiz-result-msg{margin-top:12px;font-size:0.9rem;color:var(--text)}

/* FLASHCARDS */
.fc-container{display:flex;flex-direction:column;align-items:center;gap:20px}
.fc-progress-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:400px}
.fc-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:background 0.2s}
.fc-dot.active{background:var(--primary)}
.fc-dot.done{background:var(--success)}
.fc-scene{perspective:1000px;width:100%;max-width:520px;height:240px;cursor:pointer}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-front{background:var(--card);border-color:rgba(212,175,55,0.2)}
.fc-back{background:var(--card2);transform:rotateY(180deg);border-color:rgba(74,222,128,0.2)}
.fc-face-label{font-size:0.65rem;font-family:'Fira Code',monospace;color:var(--text-dim);letter-spacing:0.15em;margin-bottom:10px;font-weight:600}
.fc-front .fc-face-label{color:rgba(212,175,55,0.5)}
.fc-back .fc-face-label{color:rgba(74,222,128,0.5)}
.fc-question{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:var(--primary);line-height:1.5}
.fc-answer{font-size:0.88rem;color:var(--text);line-height:1.65;font-family:'Lora',serif}
.fc-answer .math{font-family:'Fira Code',monospace;color:var(--secondary);font-size:0.9rem}
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.fc-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text-muted);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;transition:all 0.2s}
.fc-btn:hover{border-color:var(--primary);color:var(--primary)}
.fc-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}
.fc-hint{font-size:0.75rem;color:var(--text-dim);font-style:italic}
.fc-counter{font-family:'Fira Code',monospace;font-size:0.8rem;color:var(--text-muted)}

/* TIPS PANEL */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px}
.tip-card{background:var(--card);border:1px solid rgba(74,222,128,0.2);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.tip-card::before{content:'💡';position:absolute;top:12px;right:14px;font-size:1.2rem;opacity:0.3}
.tip-card-num{font-family:'Fira Code',monospace;font-size:0.68rem;color:var(--secondary);font-weight:600;margin-bottom:6px}
.tip-card-title{font-weight:800;color:var(--text);margin-bottom:6px;font-size:0.88rem}
.tip-card-body{font-size:0.82rem;color:var(--text-muted);line-height:1.65}
.tip-card-body .math{font-family:'Fira Code',monospace;color:var(--primary);font-size:0.8rem}

/* FORMULA SHEET */
.formula-sheet{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.formula-sheet-title{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.formula-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(212,175,55,0.07)}
.formula-row:last-child{border-bottom:none}
.formula-name{font-size:0.8rem;color:var(--text-muted);min-width:160px;font-style:italic}
.formula-expr{font-family:'Fira Code',monospace;font-size:0.85rem;color:var(--primary);flex:1}

/* POMODORO */
.pomo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.pomo-overlay.show{display:flex}
.pomo-modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;min-width:300px;box-shadow:var(--shadow)}
.pomo-label{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:10px}
.pomo-time{font-family:'Cinzel',serif;font-size:4rem;font-weight:900;color:var(--primary);line-height:1}
.pomo-mode{font-size:0.88rem;color:var(--text-muted);margin-top:8px}
.pomo-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.pomo-btn{padding:9px 22px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text-muted);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;transition:all 0.2s}
.pomo-btn.start{background:var(--primary);color:var(--bg);border-color:var(--primary)}
.pomo-btn.start:hover{opacity:0.88}
.pomo-btn:hover:not(.start){border-color:var(--primary);color:var(--primary)}
.pomo-progress{width:100%;height:6px;background:var(--bg);border-radius:3px;margin-top:16px;overflow:hidden}
.pomo-progress-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--primary),#f59e0b);border-radius:3px;transition:width 1s linear}

/* AI TUTOR */
.ai-fab{position:fixed;bottom:24px;right:24px;z-index:150;width:52px;height:52px;background:var(--primary);border:none;border-radius:50%;cursor:pointer;font-size:1.4rem;box-shadow:0 4px 20px rgba(212,175,55,0.4);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(212,175,55,0.5)}
.ai-panel{position:fixed;bottom:86px;right:24px;z-index:150;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);display:none;flex-direction:column;max-height:500px}
.ai-panel.show{display:flex}
.ai-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-panel-title{font-family:'Cinzel',serif;font-size:0.88rem;font-weight:700;color:var(--primary)}
.ai-panel-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:color 0.2s}
.ai-panel-close:hover{color:var(--error)}
.ai-key-input{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.ai-key-input input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'Fira Code',monospace;font-size:0.75rem;outline:none}
.ai-key-input input:focus{border-color:var(--primary)}
.ai-key-input input::placeholder{color:var(--text-dim)}
.ai-key-btn{background:var(--primary-dim);border:1px solid var(--primary);color:var(--primary);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-weight:700;white-space:nowrap}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:180px}
.ai-msg{font-size:0.82rem;line-height:1.6;max-width:88%;padding:9px 12px;border-radius:10px}
.ai-msg.user{background:var(--primary-dim);border:1px solid rgba(212,175,55,0.2);color:var(--text);align-self:flex-end;border-radius:10px 10px 3px 10px}
.ai-msg.bot{background:var(--card);border:1px solid var(--border);color:var(--text-muted);align-self:flex-start;border-radius:10px 10px 10px 3px}
.ai-msg.thinking{font-style:italic;color:var(--text-dim)}
.ai-input-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:8px}
.ai-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.82rem;outline:none;resize:none}
.ai-input:focus{border-color:var(--primary)}
.ai-send{background:var(--primary);border:none;color:var(--bg);border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:0.88rem;transition:opacity 0.2s}
.ai-send:hover{opacity:0.85}

/* UTILITIES */
.hidden{display:none!important}
.tab-content{display:none}
.tab-content.active{display:block}
h3.section-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--primary);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>
</head>

<script>
// ============================================================
// DATA
// ============================================================
const TOPICS = [
  {
    id:'foundations', icon:'📍', name:'Foundations',
    tagline:'Points, lines, planes, angles — the building blocks',
    learn:[
      {icon:'🔹',title:'Points, Lines & Planes',body:`
        <div class="def-box"><span class="term">Point</span><div class="definition">An exact location in space. Has no size — just position. Written as a capital letter: <strong>A</strong>, <strong>B</strong>, <strong>P</strong>.</div></div>
        <div class="def-box"><span class="term">Line</span><div class="definition">Extends infinitely in both directions. Named by two points or a lowercase letter: <strong>line AB</strong> or <strong>line ℓ</strong>. Has one dimension.</div></div>
        <div class="def-box"><span class="term">Line Segment</span><div class="definition">Part of a line with two endpoints. Written <strong>AB̄</strong>. Has a definite length.</div></div>
        <div class="def-box"><span class="term">Ray</span><div class="definition">Starts at a point and extends infinitely in one direction. Written <strong>AB→</strong> (starts at A, through B).</div></div>
        <div class="def-box"><span class="term">Plane</span><div class="definition">A flat surface extending infinitely in all directions. Has two dimensions. Named by 3 non-collinear points or a letter: Plane <strong>ABC</strong>.</div></div>
        <div class="tip-box"><strong>💡 Tip:</strong> Two points determine exactly one line. Three non-collinear points determine exactly one plane. Three collinear points are all on the same line — they don't determine a unique plane.</div>
      `},
      {icon:'∠',title:'Types of Angles',body:`
        <div class="formula-box">
          <div class="label">ANGLE TYPES</div>
          Acute: 0° &lt; θ &lt; 90°<br>
          Right: θ = 90° (marked with □)<br>
          Obtuse: 90° &lt; θ &lt; 180°<br>
          Straight: θ = 180° (a straight line)<br>
          Reflex: 180° &lt; θ &lt; 360°
        </div>
        <div class="def-box"><span class="term">Complementary Angles</span><div class="definition">Two angles that sum to <strong>90°</strong>. Each is the complement of the other.</div></div>
        <div class="def-box"><span class="term">Supplementary Angles</span><div class="definition">Two angles that sum to <strong>180°</strong>.</div></div>
        <div class="def-box"><span class="term">Vertical Angles</span><div class="definition">Non-adjacent angles formed by two intersecting lines. They are always <strong>equal</strong>.</div></div>
        <div class="def-box"><span class="term">Adjacent Angles</span><div class="definition">Share a common vertex and side but don't overlap.</div></div>
        <div class="warn-box"><strong>⚠ Common Mistake:</strong> Complementary does NOT mean equal. 30° + 60° = 90° — they're complementary but not equal.</div>
      `},
      {icon:'↔',title:'Parallel & Perpendicular Lines',body:`
        <div class="def-box"><span class="term">Parallel Lines (∥)</span><div class="definition">Lines in the same plane that never intersect. Same slope. Written: <strong>AB ∥ CD</strong>.</div></div>
        <div class="def-box"><span class="term">Perpendicular Lines (⊥)</span><div class="definition">Lines that intersect at 90°. Their slopes are negative reciprocals: if m₁ = a/b, then m₂ = -b/a.</div></div>
        <div class="def-box"><span class="term">Transversal</span><div class="definition">A line that crosses two or more other lines.</div></div>
        <div class="formula-box">
          <div class="label">ANGLES FORMED BY PARALLEL LINES + TRANSVERSAL</div>
          Corresponding angles → Equal<br>
          Alternate interior angles → Equal<br>
          Alternate exterior angles → Equal<br>
          Co-interior (same-side interior) → Supplementary (sum = 180°)
        </div>
        <div class="tip-box"><strong>💡 Tip:</strong> If you see two parallel lines cut by a transversal, all 8 angles formed are either equal to each other or supplementary to each other. Just two values fill all 8 angles!</div>
      `},
      {icon:'🧮',title:'Angle Bisectors & Midpoints',body:`
        <div class="def-box"><span class="term">Angle Bisector</span><div class="definition">A ray that divides an angle into two equal parts. If BD bisects ∠ABC, then ∠ABD = ∠DBC.</div></div>
        <div class="def-box"><span class="term">Midpoint</span><div class="definition">The point exactly halfway between two endpoints. Divides a segment into two equal parts.</div></div>
        <div class="def-box"><span class="term">Perpendicular Bisector</span><div class="definition">A line perpendicular to a segment at its midpoint. Every point on it is equidistant from the two endpoints.</div></div>
        <div class="formula-box">
          <div class="label">MIDPOINT FORMULA</div>
          M = ((x₁+x₂)/2, (y₁+y₂)/2)
        </div>
        <div class="eng-box"><strong>🔧 Real World:</strong> Midpoints are used in construction to find center points of beams and in GPS systems to find the halfway point of a route.</div>
      `},
    ],
    examples:[
      {
        title:'Finding Complementary and Supplementary Angles',diff:'basic',
        problem:'Angle A = 37°. Find its complement and its supplement.',
        steps:[
          {t:'<strong>Complement:</strong> Two angles are complementary when they sum to 90°.',math:'90° − 37° = 53°'},
          {t:'<strong>Supplement:</strong> Two angles are supplementary when they sum to 180°.',math:'180° − 37° = 143°'},
          {t:'<strong>Check:</strong> 37° + 53° = 90° ✓ and 37° + 143° = 180° ✓',math:''},
        ],
        answer:'Complement = 53°, Supplement = 143°'
      },
      {
        title:'Parallel Lines & Transversal — Angle Relationships',diff:'inter',
        problem:'Lines ℓ ∥ m are cut by a transversal. One angle formed is 112°. Find all 8 angles.',
        steps:[
          {t:'Label the 112° angle. Its vertical angle is also <strong>112°</strong>.',math:'Vertical angles: 112°'},
          {t:'The supplementary angle to 112° is <strong>68°</strong>.',math:'180° − 112° = 68°'},
          {t:'That supplement\'s vertical angle is also <strong>68°</strong>.',math:'Vertical angles: 68°'},
          {t:'<strong>Same pattern repeats</strong> on the second parallel line — 4 more angles: 112°, 112°, 68°, 68°.',math:'Corresponding angles are equal'},
        ],
        answer:'4 angles of 112° and 4 angles of 68°'
      },
      {
        title:'Angle Bisector Problem',diff:'adv',
        problem:'Ray BD bisects ∠ABC. ∠ABD = (3x + 5)° and ∠DBC = (5x − 11)°. Find x and ∠ABC.',
        steps:[
          {t:'<strong>Set up equation:</strong> Since BD bisects ∠ABC, both halves are equal.',math:'3x + 5 = 5x − 11'},
          {t:'<strong>Solve for x:</strong>',math:'5 + 11 = 5x − 3x → 16 = 2x → x = 8'},
          {t:'<strong>Find ∠ABD:</strong>',math:'3(8) + 5 = 29°'},
          {t:'<strong>Find ∠ABC:</strong> It\'s twice ∠ABD.',math:'∠ABC = 2 × 29° = 58°'},
        ],
        answer:'x = 8, ∠ABC = 58°'
      }
    ],
    tips:[
      {num:'01',title:'The 8-Angle Trick',body:'Parallel lines + transversal = only 2 angle values. All 8 angles are either equal to or supplementary to each other. Find one and you\'ve found them all.'},
      {num:'02',title:'Naming Angles Correctly',body:'An angle named ∠ABC means the vertex is at B. The rays go through A and C. When there\'s only one angle at a vertex, you can just say ∠B.'},
      {num:'03',title:'Vertical Angles — Always Equal',body:'When two straight lines cross, the opposite (vertical) angles are ALWAYS equal. This is one of the most used facts in geometry proofs.'},
      {num:'04',title:'Look for Straight Lines',body:'A straight line = 180°. Any angles on one side of a line must add up to 180°. This catches a lot of angle-finding problems.'},
    ],
    flashcards:[
      {q:'What is the difference between a line and a line segment?',a:'A line extends infinitely in both directions (no endpoints). A line segment has two fixed endpoints and a definite length.'},
      {q:'Two angles are complementary. One is 25°. What is the other?',a:'65°. Complementary angles sum to 90°: 90° − 25° = 65°.'},
      {q:'What are vertical angles?',a:'Non-adjacent angles formed when two lines intersect. They are always equal.'},
      {q:'Lines ℓ ∥ m, transversal cuts them. Alternate interior angles are...?',a:'Equal (congruent). They are on opposite sides of the transversal, between the parallel lines.'},
      {q:'What is a perpendicular bisector?',a:'A line that (1) is perpendicular to a segment and (2) passes through the segment\'s midpoint.'},
      {q:'What are co-interior (same-side interior) angles?',a:'Angles between parallel lines, on the same side of the transversal. They are supplementary (sum to 180°).'},
      {q:'Define: Reflex angle',a:'An angle greater than 180° and less than 360°.'},
      {q:'An angle bisector splits ∠XYZ into two equal parts. ∠XYZ = 80°. Each half = ?',a:'40°. The bisector creates two equal angles: 80° ÷ 2 = 40°.'},
    ],
    quiz:[
      {q:'An angle measures 67°. Its supplement is:',opts:['23°','113°','123°','33°'],ans:1,exp:'Supplementary angles sum to 180°. 180° − 67° = 113°.'},
      {q:'Two lines intersect forming angles of x° and (2x + 30)°. If they are supplementary, x = ?',opts:['50°','60°','70°','40°'],ans:0,exp:'x + 2x + 30 = 180 → 3x = 150 → x = 50°.'},
      {q:'Parallel lines are cut by a transversal. One angle = 75°. The co-interior angle on the same side is:',opts:['75°','105°','15°','115°'],ans:1,exp:'Co-interior angles are supplementary: 180° − 75° = 105°.'},
      {q:'Which set of angle measures are complementary?',opts:['50°, 130°','45°, 55°','40°, 50°','30°, 60°'],ans:2,exp:'Complementary = sum to 90°. 40° + 50° = 90°.'},
      {q:'A ray bisects a 96° angle. Each resulting angle is:',opts:['48°','24°','96°','192°'],ans:0,exp:'96° ÷ 2 = 48°.'},
      {q:'Vertical angles are always:',opts:['Supplementary','Complementary','Congruent (equal)','Right angles'],ans:2,exp:'Vertical angles are always equal. This is the Vertical Angle Theorem.'},
      {q:'If ∠ABD = (4x − 10)° and ∠DBC = (2x + 16)° and BD bisects ∠ABC, find x.',opts:['x = 10','x = 13','x = 11','x = 8'],ans:1,exp:'4x − 10 = 2x + 16 → 2x = 26 → x = 13.'},
      {q:'What is the name of the angle formed between a transversal and two parallel lines that are on opposite sides of the transversal and outside the parallel lines?',opts:['Alternate interior','Co-interior','Corresponding','Alternate exterior'],ans:3,exp:'Alternate exterior angles are outside the parallel lines on opposite sides of the transversal — and they are equal.'},
      {q:'How many points are needed to define a unique plane?',opts:['2','3 collinear','3 non-collinear','4'],ans:2,exp:'Exactly 3 non-collinear points define a unique plane. If they were collinear, infinitely many planes could pass through them.'},
      {q:'∠A + ∠B = 180° and ∠A = 3∠B. Find ∠B.',opts:['45°','60°','90°','30°'],ans:0,exp:'3∠B + ∠B = 180 → 4∠B = 180 → ∠B = 45°.'},
    ]
  },
  {
    id:'triangles', icon:'🔺', name:'Triangles',
    tagline:'The most fundamental polygon — properties & theorems',
    learn:[
      {icon:'📏',title:'Triangle Classification',body:`
        <div class="section-label">By Sides</div>
        <div class="def-box"><span class="term">Equilateral</span><div class="definition">All 3 sides equal, all 3 angles equal (60° each).</div></div>
        <div class="def-box"><span class="term">Isosceles</span><div class="definition">Exactly 2 sides equal. The angles opposite the equal sides (base angles) are also equal.</div></div>
        <div class="def-box"><span class="term">Scalene</span><div class="definition">All 3 sides different. All 3 angles different.</div></div>
        <div class="section-label">By Angles</div>
        <div class="def-box"><span class="term">Acute</span><div class="definition">All three angles are less than 90°.</div></div>
        <div class="def-box"><span class="term">Right</span><div class="definition">One angle is exactly 90°. The side opposite it is the hypotenuse.</div></div>
        <div class="def-box"><span class="term">Obtuse</span><div class="definition">One angle is greater than 90°.</div></div>
        <div class="tip-box"><strong>💡 Tip:</strong> A triangle CANNOT have two right angles or two obtuse angles — the angles would sum to more than 180°!</div>
      `},
      {icon:'∑',title:'Triangle Angle Theorems',body:`
        <div class="formula-box">
          <div class="label">TRIANGLE ANGLE SUM THEOREM</div>
          ∠A + ∠B + ∠C = 180°<br><br>
          <div class="label">EXTERIOR ANGLE THEOREM</div>
          Exterior angle = sum of the two non-adjacent interior angles<br>
          ∠ext = ∠A + ∠B (where ∠ext is at vertex C)
        </div>
        <div class="def-box"><span class="term">Triangle Inequality Theorem</span><div class="definition">The sum of any two sides must be <strong>greater than</strong> the third side. For sides a, b, c: a + b > c, a + c > b, b + c > a.</div></div>
        <div class="warn-box"><strong>⚠ Key Check:</strong> Before solving a triangle problem, verify it's a valid triangle using the Triangle Inequality. Sides 2, 3, 6 do NOT form a triangle (2 + 3 = 5 < 6)!</div>
        <div class="note-box"><strong>📝 Note:</strong> The exterior angle theorem is incredibly useful — it lets you find angles without needing all three interior angles first.</div>
      `},
      {icon:'≅',title:'Triangle Congruence (SSS, SAS, ASA, AAS, HL)',body:`
        <div class="formula-box">
          <div class="label">CONGRUENCE POSTULATES & THEOREMS</div>
          SSS: Side-Side-Side — all 3 sides equal<br>
          SAS: Side-Angle-Side — 2 sides + included angle<br>
          ASA: Angle-Side-Angle — 2 angles + included side<br>
          AAS: Angle-Angle-Side — 2 angles + non-included side<br>
          HL: Hypotenuse-Leg (right triangles only)
        </div>
        <div class="warn-box"><strong>⚠ NOT Valid:</strong> AAA only proves similarity, NOT congruence. SSA (side-side-angle) is also NOT a valid congruence postulate — it can produce two different triangles (the ambiguous case)!</div>
        <div class="tip-box"><strong>💡 Memory Trick:</strong> "SSS, SAS, ASA, AAS — all valid. AAA and SSA — no way!"</div>
      `},
      {icon:'∼',title:'Triangle Similarity (AA, SAS, SSS)',body:`
        <div class="formula-box">
          <div class="label">SIMILARITY POSTULATES</div>
          AA: Angle-Angle — 2 pairs of equal angles → similar<br>
          SAS~: 2 sides proportional + included angle equal<br>
          SSS~: All 3 pairs of sides proportional
        </div>
        <div class="def-box"><span class="term">Corresponding Sides</span><div class="definition">In similar triangles, corresponding sides are proportional: a/a' = b/b' = c/c' = k (the scale factor).</div></div>
        <div class="def-box"><span class="term">Scale Factor</span><div class="definition">The ratio of corresponding sides. If k = 2, the new triangle is twice as large.</div></div>
        <div class="eng-box"><strong>🔧 Real World:</strong> Architects use similar triangles to scale blueprints. Surveyors use them to measure heights of buildings and mountains indirectly.</div>
      `},
      {icon:'📐',title:'Special Right Triangles',body:`
        <div class="formula-box">
          <div class="label">45-45-90 TRIANGLE</div>
          Legs: a, a<br>
          Hypotenuse: a√2<br>
          Ratio: 1 : 1 : √2
        </div>
        <div class="formula-box">
          <div class="label">30-60-90 TRIANGLE</div>
          Short leg (opp 30°): a<br>
          Long leg (opp 60°): a√3<br>
          Hypotenuse (opp 90°): 2a<br>
          Ratio: 1 : √3 : 2
        </div>
        <div class="tip-box"><strong>💡 Tip:</strong> Memorize these ratios. In 30-60-90: the hypotenuse is always DOUBLE the short leg. In 45-45-90: just multiply any leg by √2 to get the hypotenuse.</div>
      `}
    ],
    examples:[
      {
        title:'Finding a Missing Angle',diff:'basic',
        problem:'In triangle ABC, ∠A = 55° and ∠B = 78°. Find ∠C.',
        steps:[
          {t:'<strong>Triangle Angle Sum:</strong> All angles in a triangle add to 180°.',math:'∠A + ∠B + ∠C = 180°'},
          {t:'<strong>Substitute known values:</strong>',math:'55° + 78° + ∠C = 180°'},
          {t:'<strong>Solve:</strong>',math:'133° + ∠C = 180° → ∠C = 47°'},
        ],
        answer:'∠C = 47°'
      },
      {
        title:'Using the Exterior Angle Theorem',diff:'inter',
        problem:'An exterior angle of a triangle is 115°. Two interior angles are 65° and x°. Find x.',
        steps:[
          {t:'<strong>Exterior Angle Theorem:</strong> Exterior angle = sum of two non-adjacent interior angles.',math:'115° = 65° + x'},
          {t:'<strong>Solve:</strong>',math:'x = 115° − 65° = 50°'},
          {t:'<strong>Verify:</strong> Third angle = 180° − 65° − 50° = 65°. Exterior = 180° − 65° = 115° ✓',math:''},
        ],
        answer:'x = 50°'
      },
      {
        title:'Similar Triangles — Find the Missing Side',diff:'inter',
        problem:'△ABC ~ △DEF. AB = 8, BC = 12, EF = 9. Find DE.',
        steps:[
          {t:'<strong>Similar triangles:</strong> Corresponding sides are proportional.',math:'AB/DE = BC/EF'},
          {t:'<strong>Substitute:</strong>',math:'8/DE = 12/9'},
          {t:'<strong>Cross multiply:</strong>',math:'12 · DE = 8 · 9 = 72'},
          {t:'<strong>Solve:</strong>',math:'DE = 72/12 = 6'},
        ],
        answer:'DE = 6'
      }
    ],
    tips:[
      {num:'01',title:'Exterior Angle Shortcut',body:'The exterior angle of a triangle equals the sum of the two remote interior angles. Skip adding all 3 angles and go straight to the answer.'},
      {num:'02',title:'Isosceles Triangle Angles',body:'In an isosceles triangle, the BASE ANGLES (the angles opposite the equal sides) are equal. If the apex angle is 40°, each base angle = (180° − 40°)/2 = 70°.'},
      {num:'03',title:'Can These Be a Triangle?',body:'Quick check: add the two smaller sides. If their sum > third side, it\'s valid. If equal or less, impossible.'},
      {num:'04',title:'45-45-90 Fast Trick',body:'If you see a right isosceles triangle (legs equal), just multiply any leg by √2 to get hypotenuse. No Pythagorean theorem needed!'},
    ],
    flashcards:[
      {q:'What is the Triangle Angle Sum Theorem?',a:'All three interior angles of a triangle sum to 180°.'},
      {q:'What does the Exterior Angle Theorem state?',a:'An exterior angle of a triangle equals the sum of the two non-adjacent (remote) interior angles.'},

        <div class="formula-box">
          <div class="label">STANDARD AREA FORMULAS</div>
          Square: A = s²<br>
          Rectangle: A = l × w<br>
          Triangle: A = ½bh (b = base, h = perpendicular height)<br>
          Parallelogram: A = bh<br>
          Trapezoid: A = ½(b₁ + b₂)h<br>
          Rhombus/Kite: A = ½d₁d₂ (d = diagonal lengths)<br>
          Circle: A = πr²<br>
          Regular polygon: A = ½ × apothem × perimeter
        </div>
        <div class="warn-box"><strong>⚠ Height vs. Side:</strong> For triangles and parallelograms, the height (h) is the PERPENDICULAR distance to the base — not the slant side! Always identify the perpendicular height.</div>
      `},
      {icon:'📏',title:'Perimeter of Common Shapes',body:`

          <div class="label">PERIMETER FORMULAS</div>

          Rectangle: P = 2(l + w)<br>
          Triangle: P = a + b + c<br>
          Parallelogram: P = 2(a + b)<br>
          Circle (Circumference): C = 2πr<br>
          Regular polygon: P = n × s
        </div>
        <div class="def-box"><span class="term">Apothem</span><div class="definition">The distance from the center of a regular polygon to the midpoint of a side. Used in area calculations.</div></div>
        <div class="tip-box"><strong>💡 Tip:</strong> For composite figures, add perimeters but DON'T count interior edges! Only trace the outer boundary.</div>
      `},
      {icon:'🔶',title:'Composite Figures',body:`

        <div class="eng-box"><strong>🔧 Real World:</strong> Composite area calculations are used constantly in architecture (floor plans), landscaping, and civil engineering (cross-sections of roads and beams).</div>
      `},
      {icon:'🌐',title:'Heron\'s Formula & Shoelace Formula',body:`

          A = √(s(s−a)(s−b)(s−c))
        </div>

          <div class="label">SHOELACE FORMULA (polygon with coordinates)</div>
          A = ½ |Σ(xᵢyᵢ₊₁ − xᵢ₊₁yᵢ)|<br>

        <div class="def-box"><span class="term">Inductive Reasoning</span><div class="definition">Drawing a general conclusion from specific examples. Pattern-based. Can be proven false with a counterexample.</div></div>
        <div class="def-box"><span class="term">Deductive Reasoning</span><div class="definition">Drawing specific conclusions from general rules (theorems, definitions, postulates). Guaranteed to be true if premises are true.</div></div>
        <div class="def-box"><span class="term">Postulate (Axiom)</span><div class="definition">A statement accepted as true without proof. The foundation of geometry.</div></div>
        <div class="def-box"><span class="term">Theorem</span><div class="definition">A statement that has been proven using postulates, definitions, and previously proven theorems.</div></div>
        <div class="tip-box"><strong>💡 Tip:</strong> Inductive reasoning says "it's probably true." Deductive reasoning says "it MUST be true." Geometry proofs use ONLY deductive reasoning.</div>
      `},

          Symmetric Property: if a=b then b=a<br>

          Addition/Subtraction Property of Equality<br>
          Multiplication/Division Property of Equality<br>
          Angle Addition Postulate<br>
          Segment Addition Postulate<br>
          Triangle Angle Sum Theorem<br>
          Vertical Angle Theorem
        </div>
      `},

          Converse: If q, then p (q → p)<br>
          Inverse: If not p, then not q (¬p → ¬q)<br>
          Contrapositive: If not q, then not p (¬q → ¬p)
        </div>
        <div class="note-box"><strong>Truth Values:</strong><br>• A conditional and its contrapositive always have the SAME truth value.<br>• A converse and its inverse always have the SAME truth value.<br>• A conditional and its converse can have DIFFERENT truth values.</div>
        <div class="warn-box"><strong>⚠ Key:</strong> "If it's a square, then it's a rectangle" is TRUE. The converse "If it's a rectangle, then it's a square" is FALSE.</div>

function addXP(n){
  xp+=n;
  const lvl = levels.filter(l=>l.min<=xp).pop();
  const next = levels.find(l=>l.min>xp)||{min:xp+1000};
  document.getElementById('level-badge').textContent=lvl.name;
  const pct = Math.min(100, ((xp-lvl.min)/(next.min-lvl.min))*100);
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-text').textContent=`${xp} XP`;
  const flash = document.createElement('div');
  flash.style.cssText='position:fixed;top:70px;right:20px;z-index:999;background:var(--primary);color:var(--bg);font-family:Cinzel,serif;font-weight:900;font-size:0.9rem;padding:6px 16px;border-radius:20px;opacity:1;transition:all 1s';
  flash.textContent='+'+n+' XP';
  document.body.appendChild(flash);
  setTimeout(()=>{flash.style.opacity='0';flash.style.transform='translateY(-20px)'},800);
  setTimeout(()=>flash.remove(),1800);
}
function addStreak(){
  streak++;
  document.getElementById('streak-badge').textContent='🔥 '+streak+' Streak';
}

function getTopicProgress(i){
  const qs = quizState[i];
  if(!qs) return 0;
  return Math.round((qs.answered||0)/TOPICS[i].quiz.length*100);
}

// ============================================================
function selectTopic(i){ currentTopic=i; currentTab='learn'; renderSidebar(); renderMain(); window.scrollTo(0,0); }
function switchTab(t){ currentTab=t; renderMain(true); }

function renderMain(tabOnly=false){
  const t = TOPICS[currentTopic];
  const mc = document.getElementById('main-content');
  if(!tabOnly){
    mc.innerHTML = `
      <div class="topic-header">
        <div class="topic-header-icon">${t.icon}</div>
        <div>
          <div class="topic-header-title">${t.name}</div>
          <div class="topic-header-tagline">${t.tagline}</div>
          <div class="topic-header-progress">
            <div class="topic-progress-bar"><div class="topic-progress-bar-fill" style="width:${getTopicProgress(currentTopic)}%"></div></div>
            <div class="topic-progress-text">${getTopicProgress(currentTopic)}% complete</div>
          </div>
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn ${currentTab==='learn'?'active':''}" onclick="switchTab('learn')">📖 Learn</button>
        <button class="tab-btn ${currentTab==='tips'?'active':''}" onclick="switchTab('tips')">💡 Tips</button>
        <button class="tab-btn ${currentTab==='examples'?'active':''}" onclick="switchTab('examples')">✏️ Examples</button>
        <button class="tab-btn ${currentTab==='practice'?'active':''}" onclick="switchTab('practice')">🎯 Practice</button>
        <button class="tab-btn ${currentTab==='flashcards'?'active':''}" onclick="switchTab('flashcards')">🃏 Flashcards</button>
      </div>
      <div id="tab-content-area"></div>`;
  } else {
    const tabs = mc.querySelector('.tab-bar');
    if(tabs) tabs.querySelectorAll('.tab-btn').forEach(b=>{
      const active = b.textContent.toLowerCase().includes(currentTab)||
        (currentTab==='learn'&&b.textContent.includes('Learn'))||
        (currentTab==='tips'&&b.textContent.includes('Tips'))||
        (currentTab==='examples'&&b.textContent.includes('Examples'))||
        (currentTab==='practice'&&b.textContent.includes('Practice'))||
        (currentTab==='flashcards'&&b.textContent.includes('Flashcards'));
      b.classList.toggle('active', active);
    });
  }
  const area = mc.querySelector('#tab-content-area') || document.getElementById('tab-content-area');
  if(!area) return;

  if(currentTab==='learn') area.innerHTML = renderLearn(t);
  else if(currentTab==='tips') area.innerHTML = renderTips(t);
  else if(currentTab==='examples') area.innerHTML = renderExamples(t);
  else if(currentTab==='practice') { area.innerHTML = renderPractice(t); attachPractice(); }
  else if(currentTab==='flashcards') { area.innerHTML = renderFC(t); attachFC(); }
}

const stepProgress = {};
function nextStep(ei, total){
  const cur = stepProgress[ei]||0;
  if(cur<total){
    const el = document.getElementById(`step-${ei}-${cur}`);
    if(el){el.classList.remove('hidden'); setTimeout(()=>el.classList.add('visible'),10);}
    stepProgress[ei]=cur+1;
    if(cur+1===total) document.getElementById(`ans-${ei}`).classList.remove('hidden');
  }
}
function showAllSteps(ei, total){
  for(let i=0;i<total;i++){
    const el=document.getElementById(`step-${ei}-${i}`);
    if(el){el.classList.remove('hidden');setTimeout(()=>el.classList.add('visible'),i*80);}
    stepProgress[ei]=total;
  }
  setTimeout(()=>document.getElementById(`ans-${ei}`).classList.remove('hidden'),total*80+100);
}

function attachPractice(){
  if(!quizState[currentTopic]) quizState[currentTopic]={score:0,answered:0,answers:{}};
  const qs = quizState[currentTopic];
  // Restore previous answers
  Object.keys(qs.answers).forEach(qi=>{
    const {chosen,correct,exp} = qs.answers[qi];
    const q = TOPICS[currentTopic].quiz[qi];
    restoreQ(parseInt(qi), chosen, correct, q.ans, exp);
  });
  updateQScore();
}

function answerQ(qi, oi, correct, expEnc){
  if(quizState[currentTopic]?.answers?.[qi]) return;
  if(!quizState[currentTopic]) quizState[currentTopic]={score:0,answered:0,answers:{}};
  const qs = quizState[currentTopic];
  const isCorrect = oi===correct;
  qs.answers[qi]={chosen:oi, correct:isCorrect, exp:expEnc};
  qs.answered++;
  if(isCorrect){ qs.score++; addXP(10); addStreak(); } else { addXP(2); streak=0; document.getElementById('streak-badge').textContent='🔥 0 Streak'; }
  restoreQ(qi, oi, isCorrect, correct, expEnc);
  updateQScore();
  renderSidebar();
}

function restoreQ(qi, chosen, isCorrect, correct, expEnc){
  const card = document.getElementById(`qcard-${qi}`);
  if(!card) return;
  card.classList.add(isCorrect?'correct':'wrong');
  const btns = card.querySelectorAll('.option-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===chosen) b.classList.add(isCorrect?'selected-correct':'selected-wrong');
    if(!isCorrect && i===correct) b.classList.add('reveal-correct');
  });
  const fb = document.getElementById(`fb-${qi}`);
  fb.classList.add('show', isCorrect?'correct':'wrong');
  fb.innerHTML = isCorrect
    ? `<strong>✅ Correct!</strong> ${decodeURIComponent(expEnc)}`
    : `<strong>❌ Not quite.</strong> ${decodeURIComponent(expEnc)}`;
}

function updateQScore(){
  const qs = quizState[currentTopic]||{score:0,answered:0};
  const sc = document.getElementById('q-score');
  if(sc) sc.textContent = qs.score;
}

function checkAllAnswered(){
  const qs = quizState[currentTopic]||{score:0,answered:0};
  const total = TOPICS[currentTopic].quiz.length;
  const result = document.getElementById('quiz-result');
  result.classList.add('show');
  const pct = Math.round(qs.score/total*100);
  let msg = pct>=90?'🏆 Outstanding! You\'ve mastered this topic!'
    :pct>=70?'🎉 Great job! Review a few tricky ones.'
    :pct>=50?'📚 Decent start — keep practicing!'
    :'💪 Keep going — review the concept cards and try again!';
  result.innerHTML = `
    <div class="quiz-result-score">${qs.score}/${total}</div>
    <div class="quiz-result-label">${pct}% correct</div>
    <div class="quiz-result-msg">${msg}</div>`;
}

function resetQuiz(){
  delete quizState[currentTopic];
  renderMain(true);
}

// ============================================================
// FLASHCARDS TAB
// ============================================================
function renderFC(t){
  const idx = fcState[currentTopic]||0;
  const cards = t.flashcards;
  return `
    <div class="fc-container">
      <div style="font-family:'Cinzel',serif;font-size:0.85rem;color:var(--text-muted)">Click the card to flip it</div>
      <div class="fc-progress-dots" id="fc-dots">
        ${cards.map((_,i)=>`<div class="fc-dot ${i===idx?'active':''}" onclick="goFC(${i})"></div>`).join('')}
      </div>
      <div class="fc-counter" id="fc-counter">${idx+1} / ${cards.length}</div>
      <div class="fc-scene" onclick="flipFC()">
        <div class="fc-card" id="fc-card">
          <div class="fc-face fc-front">
            <div class="fc-face-label">CONCEPT</div>
            <div class="fc-question" id="fc-q">${cards[idx].q}</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-face-label">ANSWER</div>
            <div class="fc-answer" id="fc-a">${cards[idx].a}</div>
          </div>
        </div>
      </div>
      <div class="fc-controls">
        <button class="fc-btn" onclick="prevFC()">← Prev</button>
        <button class="fc-btn" onclick="markDone()">✓ Got it</button>
        <button class="fc-btn" onclick="nextFC()">Next →</button>
        <button class="fc-btn" onclick="shuffleFC()">🔀 Shuffle</button>
      </div>
      <div class="fc-hint">Tip: Mark cards with "Got it" as you master them</div>
    </div>`;
}

function attachFC(){
  if(fcState[currentTopic]===undefined) fcState[currentTopic]=0;
}

function flipFC(){
  const card = document.getElementById('fc-card');
  if(card) card.classList.toggle('flipped');
}
function prevFC(){
  const t = TOPICS[currentTopic];
  fcState[currentTopic] = (fcState[currentTopic]-1+t.flashcards.length)%t.flashcards.length;
  renderMain(true);
}
function nextFC(){
  const t = TOPICS[currentTopic];
  fcState[currentTopic] = (fcState[currentTopic]+1)%t.flashcards.length;
  renderMain(true);
}
function goFC(i){ fcState[currentTopic]=i; renderMain(true); }
function markDone(){
  const dots = document.querySelectorAll('.fc-dot');
  const idx = fcState[currentTopic]||0;
  if(dots[idx]) dots[idx].classList.add('done');
  addXP(5);
  nextFC();
}
function shuffleFC(){
  const t = TOPICS[currentTopic];
  t.flashcards.sort(()=>Math.random()-0.5);
  fcState[currentTopic]=0;
  renderMain(true);
}

// ============================================================
// POMODORO
// ============================================================
function togglePomo(){ document.getElementById('pomo-overlay').classList.toggle('show'); }
function togglePomoTimer(){
  const btn = document.querySelector('.pomo-btn.start');
  if(pomoRunning){
    clearInterval(pomoInterval); pomoRunning=false;
    btn.textContent='▶ Resume';
  } else {
    pomoRunning=true; btn.textContent='⏸ Pause';
    const total = pomoMode==='focus'?25*60:5*60;
    pomoInterval=setInterval(()=>{
      pomoSecs--;
      if(pomoSecs<=0){
        clearInterval(pomoInterval); pomoRunning=false;
        btn.textContent='▶ Start';
        if(pomoMode==='focus'){ addXP(25); pomoMode='break'; pomoSecs=5*60; alert('⏰ Focus session done! +25 XP. Take a 5-min break!'); }
        else { pomoMode='focus'; pomoSecs=25*60; alert('☕ Break over! Start another focus session.'); }
        updatePomoDisplay(pomoMode==='focus'?25*60:5*60);
      }
      updatePomoDisplay(total);
    },1000);
  }
}
function updatePomoDisplay(total){
  const m=Math.floor(pomoSecs/60), s=pomoSecs%60;
  document.getElementById('pomo-time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('pomo-label').textContent=pomoMode==='focus'?'FOCUS SESSION':'BREAK TIME';
  document.getElementById('pomo-mode-text').textContent=pomoMode==='focus'?'Stay focused — you\'ve got this!':'Rest your eyes. Stretch!';
  document.getElementById('pomo-fill').style.width=(pomoSecs/total*100)+'%';
}
function resetPomo(){
  clearInterval(pomoInterval); pomoRunning=false;
  pomoMode='focus'; pomoSecs=25*60;
  document.querySelector('.pomo-btn.start').textContent='▶ Start';
  updatePomoDisplay(25*60);
}

// ============================================================
// AI TUTOR
// ============================================================
function toggleAI(){ document.getElementById('ai-panel').classList.toggle('show'); }
function saveKey(){ aiKey=document.getElementById('ai-key').value.trim(); if(aiKey) document.getElementById('ai-key').value='••••••••••••••'; }
async function sendAI(){
  const input = document.getElementById('ai-input');
  const msg = input.value.trim(); if(!msg) return;
  if(!aiKey){ appendAIMsg('bot','Please paste your Anthropic API key first!'); return; }
  input.value='';
  appendAIMsg('user', msg);
  appendAIMsg('bot','Thinking... 🔍', true);
  aiHistory.push({role:'user',content:msg});
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'You are an expert geometry tutor. Explain concepts clearly with examples. Use plain text, avoid markdown.',
        messages:aiHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text||'Sorry, I had trouble with that.';
    aiHistory.push({role:'assistant',content:reply});
    const msgs = document.getElementById('ai-messages');
    msgs.lastChild.remove();
    appendAIMsg('bot', reply);
  } catch(e){ document.getElementById('ai-messages').lastChild.remove(); appendAIMsg('bot','Error: '+e.message); }
}
function appendAIMsg(role, text, thinking=false){
  const msgs = document.getElementById('ai-messages');
  const div = document.createElement('div');
  div.className='ai-msg '+role+(thinking?' thinking':'');
  div.textContent=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
document.getElementById('ai-input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();} });

renderSidebar();
renderMain();
</script>
